<body>
<div class="app"><div class="amb"></div><div id="root"></div></div>

<script>
var S={a:'',b:'',c_feel:'',c_do:'',d:[0,0,0],e_gen:'',rate1:0,bodyWhere:'',rate2:0,shame_task:'',shame_expect:'',reflections:[]};
var AI={};
var root=document.getElementById('root');
var AUDIO=true;

function makeWhy(text){
  var btn=h('button','why-toggle','Zašto ovaj korak?');
  var box=h('div','why-box');box.innerHTML='<p>'+text+'</p>';
  btn.onclick=function(){
    var open=box.style.display==='block';
    box.style.display=open?'none':'block';
    btn.textContent=open?'Zašto ovaj korak?':'Zatvori';
  };
  var wrap=h('div','');wrap.appendChild(btn);wrap.appendChild(box);return wrap;
}

function renderDashboard(inner,hi){
  if(!hi||hi.length<2)return;
  var card=h('div','dash-card');
  var deltas=hi.map(function(s){return s.r1-s.r2}).filter(function(d){return !isNaN(d)});
  var avgDelta=deltas.length?(deltas.reduce(function(a,b){return a+b},0)/deltas.length).toFixed(1):0;
  var streak=0;for(var i=0;i<hi.length;i++){if(hi[i].r2<hi[i].r1)streak++;else break;}
  var saTotal=hi.filter(function(s){return s.shame}).length;
  var saDone=hi.filter(function(s){return s.done}).length;
  var saPct=saTotal?Math.round(saDone/saTotal*100):null;

  var html='<div class="dash-title">Pregled napretka</div>';
  html+='<div class="dash-stat"><span class="dash-stat-label">Prosečno smanjenje žudnje</span><span class="dash-stat-val '+(avgDelta>0?'good':'')+'">'+( avgDelta>0?'−':'')+Math.abs(avgDelta)+'</span></div>';
  html+='<div class="dash-stat"><span class="dash-stat-label">Uzastopne sesije s padom</span><span class="dash-stat-val '+(streak>=3?'good':streak>=1?'':'warn')+'">'+streak+'</span></div>';
  if(saPct!==null)html+='<div class="dash-stat"><span class="dash-stat-label">Eksperimenti završeni</span><span class="dash-stat-val '+(saPct>=50?'good':'warn')+'">'+saDone+'/'+saTotal+' ('+saPct+'%)</span></div>';
  html+='<div class="dash-stat"><span class="dash-stat-label">Ukupno sesija</span><span class="dash-stat-val">'+hi.length+'</span></div>';

  // Sparkline — sve sesije
  var sparkMax=Math.max.apply(null,deltas.map(Math.abs))||1;
  html+='<div style="font-size:11px;color:rgba(26,26,46,0.4);margin-top:12px;margin-bottom:6px">Pad žudnje po sesiji (najnovije desno)</div>';
  html+='<div class="spark">';
  var sparkData=hi.slice().reverse().slice(-20); // max 20 bars
  sparkData.forEach(function(ses){
    var d=ses.r1-ses.r2;
    var pct=Math.abs(d)/sparkMax*100;
    var col=d>0?'#48CAC1':d===0?'rgba(26,26,46,0.15)':'rgba(200,80,80,0.4)';
    html+='<div class="spark-bar" style="height:'+Math.max(pct,8)+'%;background:'+col+'" title="'+ses.r1+'→'+ses.r2+'"></div>';
  });
  html+='</div>';
  card.innerHTML=html;
  inner.appendChild(card);
}

function h(t,c,html){var e=document.createElement(t);if(c)e.className=c;if(html!==undefined)e.innerHTML=html;return e}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* --- TTS (Google Cloud) --- */
var audioQueue=[];
var audioPlaying=false;
var _audioCtx=null;
var _currentSource=null;

function getAudioCtx(){
  if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return _audioCtx;
}
function cleanText(text){
  return text.replace(/<[^>]*>/g,'').replace(/—/g,', ').replace(/→/g,' u ').replace(/„|“/g,'"').trim();
}
function splitSentences(text){
  // split on sentence endings, keep chunk under 200 chars
  var parts=text.match(/[^.!?]+[.!?\s]*|[^.!?]+$/g)||[text];
  var chunks=[],cur='';
  parts.forEach(function(p){
    if((cur+p).length>200&&cur){chunks.push(cur.trim());cur=p;}
    else cur+=p;
  });
  if(cur.trim())chunks.push(cur.trim());
  return chunks.filter(Boolean);
}

async function fetchTTSAudio(text){
  var resp=await fetch('/api/tts',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:text})
  });
  if(!resp.ok)throw new Error('TTS HTTP '+resp.status);
  var arrayBuf=await resp.arrayBuffer();
  return arrayBuf;
}

function speak(text){
  if(!AUDIO)return;
  stopAudio();
  var clean=cleanText(text);
  if(!clean)return;
  var sentences=splitSentences(clean);
  if(!sentences.length)return;
  audioQueue=sentences.slice();
  audioPlaying=true;
  updateSI(true);
  // prefetch first two
  var prefetched={};
  function prefetch(idx){
    if(idx<audioQueue.length&&!prefetched[idx]){
      prefetched[idx]='loading';
      fetchTTSAudio(audioQueue[idx]).then(function(buf){
        prefetched[idx]=buf;
      }).catch(function(){prefetched[idx]='error';});
    }
  }
  prefetch(0);prefetch(1);

  var idx=0;
  function playIdx(){
    if(!audioPlaying||idx>=audioQueue.length){
      audioPlaying=false;updateSI(false);return;
    }
    prefetch(idx+2); // prefetch ahead
    function waitAndPlay(){
      if(prefetched[idx]instanceof ArrayBuffer){
        var ctx=getAudioCtx();
        ctx.decodeAudioData(prefetched[idx].slice(0),function(decoded){
          if(!audioPlaying)return;
          var src=ctx.createBufferSource();
          src.buffer=decoded;
          src.connect(ctx.destination);
          _currentSource=src;
          src.onended=function(){idx++;setTimeout(playIdx,60);};
          src.start(0);
        },function(){idx++;playIdx();});
      } else if(prefetched[idx]==='error'){
        idx++;playIdx();
      } else {
        setTimeout(waitAndPlay,50); // still loading
      }
    }
    waitAndPlay();
  }
  playIdx();
}

function stopAudio(){
  audioPlaying=false;
  audioQueue=[];
  try{if(_currentSource)_currentSource.stop();}catch(e){}
  _currentSource=null;
  updateSI(false);
}
function updateSI(on){var el=document.getElementById('speak-ind');if(el)el.style.display=on?'inline-block':'none'}

/* --- AI API via Netlify Function proxy --- */
async function callAI(prompt) {
  try {
    console.log('[AI] Saljem zahtev na novi Gemini backend...');

    const response = await fetch('/api/rebt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const errorBody = await response.text();
      throw new Error('HTTP ' + response.status + ' - ' + errorBody);
    }

    const data = await response.json();
    let text = data.content.map(c => c.text || '').join('');
    text = text.replace(/```json\s*|\s*```/g, '').trim();

    let parsed;
    try {
      parsed = JSON.parse(text);
    } catch(parseErr) {
      // Pokusaj da popravimo odseceni JSON dodavanjem zatvarajucih znakova
      let fixed = text;
      // Zatvori otvorene stringove i objekte
      const openBraces = (fixed.match(/{/g)||[]).length - (fixed.match(/}/g)||[]).length;
      if(fixed.match(/"[^"]*$/)){ fixed += '"'; } // zatvori otvoreni string
      for(let i=0;i<openBraces;i++){ fixed += '}'; }
      try {
        parsed = JSON.parse(fixed);
        console.warn('[AI] JSON bio odsecen, popravljen.');
      } catch(e2) {
        throw new Error('Unterminated string in JSON at position ' + parseErr.message);
      }
    }

    'Zadrži taj isti scenario u glavi. Sada aktivno promeni TIP emocije — umešto <em>"'+esc(feelShort)+'"</em>, pusti da bude nezadovoljstvo ili žaljenje. Isti dogadjaj, drugačija emocija.';
  var step2speak=AI.rei_step2_speak||
    'Zadrzite taj isti scenario. Sada aktivno promenite tip emocije — umešto '+feelShort+', pustite da bude nezadovoljstvo ili zaljenje. Isti dogadjaj, drugacija emocija.';
  var steps=[
    {text:esc(scene)+' Pusti najgore osećanje. Oseti ga u '+bp+'. <strong>Ostani tu.</strong>',
     speak:scene+' Pusti najgore osećanje. Oseti ga u '+bp+'. Ostani tu.',dur:25},
    {text:step2text,
     speak:step2speak,dur:20},
    {text:'Izgovori naglas:<br><br><em>"'+esc(S.e_gen)+'"</em>',
     speak:'Izgovori naglas. '+S.e_gen,dur:15}
  ];
  var whyTexts=[
    'Mozak ne razlikuje dobro zamišljenu scenu od stvarne. Kada svesno zamisliš najgori scenario i ostaneš u njemu — bez bežanja — živčani sistem uči da nije opasan.',
    'Ellis je otkrio da možeš zadržati isti scenario u glavi ali promeniti TIP emocije — ne njen intenzitet. Iz iracionalne (krivica, panika) u odgovarajuću (nezadovoljstvo, žaljenje). Ovo je mišić koji se vežba.',
    'Izgovaranje naglas aktivira drugačije putanje u mozgu od puke misli. Novo uverenje počinje da se oseća kao tvoje tek kad ga čuješ sopstvenim glasom.'
  ];
  var step=0;
  var instrBox=h('div','');instrBox.style.cssText='background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);border-radius:16px;padding:24px 20px;margin:16px 0;text-align:center;min-height:130px;display:flex;align-items:center;justify-content:center';
  var instrText=h('p','');instrText.style.cssText='font-family:Instrument Serif,Georgia,serif;font-size:17px;color:#fff;line-height:1.6';
  instrText.innerHTML=steps[0].text;instrBox.appendChild(instrText);inner.appendChild(instrBox);speak(steps[0].speak);
  var tl=steps[0].dur,tr=true,ti;var circ=2*Math.PI*70;
  var ring=h('div','timer-ring');
  ring.innerHTML='<svg width="160" height="160" style="transform:rotate(-90deg)"><circle cx="80" cy="80" r="70" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/><circle id="rei-c" cx="80" cy="80" r="70" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="0" style="transition:stroke-dashoffset 1s linear"/></svg><div class="timer-num" id="rei-t">'+tl+'</div>';
  inner.appendChild(ring);
  var nb=h('button','bp','');nb.style.display='none';
  function tick(){if(!tr)return;tl--;document.getElementById('rei-t').textContent=tl;
    var p=1-tl/steps[step].dur;document.getElementById('rei-c').setAttribute('stroke-dashoffset',circ*(1-p));
    if(tl<=0){clearInterval(ti);tr=false;
      if(step<steps.length-1){nb.textContent='Sledeći korak';nb.style.display='block';
        nb.onclick=function(){step++;tl=steps[step].dur;instrText.innerHTML=steps[step].text;speak(steps[step].speak);
        document.getElementById('rei-t').textContent=tl;document.getElementById('rei-c').setAttribute('stroke-dashoffset','0');
        nb.style.display='none';
        var wb=document.getElementById('rei-why');if(wb){wb.querySelector('.why-box').style.display='none';wb.querySelector('.why-toggle').textContent='Zašto ovaj korak?';wb.querySelector('p').textContent=whyTexts[step];}
        tr=true;ti=setInterval(tick,1000)}}
      else{nb.textContent='Proveri osećaj';nb.style.display='block';nb.onclick=function(){renderBody3()}}}}
  ti=setInterval(tick,1000);inner.appendChild(nb);s.appendChild(inner);root.appendChild(s);
}

function renderBody3(){
  root.innerHTML='';var s=h('div','sf');var inner=h('div','sfi fi');
  makeTopbar(inner);inner.appendChild(bar(6));
  inner.appendChild(h('div','label','Provera'));
  var q='Kako je taj osećaj sad?';
  showNessaMsg(inner, q, {delay:400});
  inner.appendChild(h('p','hint','Bio/la je <strong>'+S.rate1+'/10</strong> pre REI.<br><br>'));
  var grid=h('div','rg');
  var delta=h('p','');delta.style.cssText='font-size:14px;margin:12px 0 20px;text-align:center;display:none';
  var nb=h('button','bg','Dalje \u2014 Shame Attack');nb.disabled=true;
  for(var n=1;n<=10;n++){(function(n){var b=h('button','rb');b.textContent=n;
    b.onclick=function(){S.rate2=n;grid.querySelectorAll('.rb').forEach(function(x){x.className='rb';x.style.background=''});
    b.className='rb sel';b.style.background='#48CAC1';delta.style.display='block';
    if(n<S.rate1){delta.textContent='Sa '+S.rate1+' na '+n+'. Osećaj prolazi.';delta.style.color='rgba(255,255,255,0.9)'}
    else{delta.textContent=n===S.rate1?'Isto. Nekad treba vise vremena.':'Porasla. Nastavi.';delta.style.color='rgba(255,255,255,0.4)'}
    nb.disabled=false};grid.appendChild(b)})(n)}
  inner.appendChild(grid);inner.appendChild(delta);nb.onclick=function(){renderShame()};
  inner.appendChild(nb);s.appendChild(inner);root.appendChild(s);
}

function renderShame(){
  root.innerHTML='';var s=h('div','sf');var inner=h('div','sfi fi');inner.style.justifyContent='flex-start';inner.style.paddingTop='0';
  makeTopbar(inner);inner.appendChild(bar(7));
  var isNTF=(AI.shame_type==='ntf');
  var screenLabel=isNTF?'Eksperiment tolerancije':'Shame Attack';
  inner.appendChild(h('div','label',screenLabel));
  var q='Ovo je rad u realnosti. Sve pre ovoga je bilo u glavi.';
  showNessaMsg(inner, q, {delay:400});
  inner.appendChild(makeWhy(isNTF?'Tolerancija na frustraciju raste samo kroz direktno iskustvo — ne kroz razgovor o njoj. Svaki put kad prođeš veče bez "nagrade" u hrani i vidiš da si OK, tvoj mozak briše jednu od pogrešnih jednadžbi.':'Namerno radiš ono čega se stidiš — uz punu svest, u stvarnoj situaciji. Katastrofa koju očekuješ obično ne dolazi. Taj jaz između očekivanja i realnosti je ono što menja uverenje.'));
  var task=h('div','insight');task.innerHTML='<div class="il">Tvoj eksperiment</div><div class="it">'+esc(S.shame_task)+'</div>';inner.appendChild(task);
  showNessaMsg(inner, 'Pre nego što to uradiš — napiši šta OČEKUJEŠ da će se desiti.', {delay:1600, speak:false});
  var nb=h('button','bg','Završi i sačuvaj');nb.disabled=!S.shame_expect;
  var t=makeTa('Očekujem da ce se desiti...',S.shame_expect,function(v){S.shame_expect=v;nb.disabled=!v});
  inner.appendChild(t.wrap);nb.onclick=function(){saveSession();renderVictory()};
  var bb=h('button','bs','Preskoči');bb.onclick=function(){S.shame_task='';S.shame_expect='';saveSession();renderVictory()};
  inner.appendChild(nb);inner.appendChild(bb);s.appendChild(inner);root.appendChild(s);
}

function renderVictory(){
  root.innerHTML='';var s=h('div','sf');var inner=h('div','sfi fi');inner.style.justifyContent='flex-start';inner.style.paddingTop='32px';
  speak('Sesija završena. Intenzitet sa '+S.rate1+' na '+S.rate2+'.');
  inner.innerHTML+='<div style="text-align:center;margin-bottom:24px"><div style="width:60px;height:60px;border-radius:50%;background:rgba(126,184,168,0.1);display:inline-flex;align-items:center;justify-content:center;font-size:26px;color:#7EB8A8">&#10003;</div></div>'+
    '<h2 class="t2" style="text-align:center;color:#fff">Sesija završena.</h2>'+
    '<p style="text-align:center;margin-bottom:6px;color:rgba(255,255,255,0.85);font-size:14px">Intenzitet: '+S.rate1+' \u2192 '+S.rate2+'</p>'+
    (S.shame_task?'<p class="hint" style="text-align:center;margin-bottom:24px">Ne zaboravi shame attack.</p>':'<p class="hint" style="text-align:center;margin-bottom:24px">Sačuvano.</p>');
  var vOld=h('div','old-b');vOld.style.marginBottom='8px';
  vOld.innerHTML='<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(180,60,60,0.5);margin-bottom:8px;font-weight:600">Staro uverenje</div><div style="font-family:Instrument Serif,Georgia,serif;font-size:15px;color:rgba(180,60,60,0.5);line-height:1.6;font-style:italic;text-decoration:line-through">„'+esc(S.b)+'“</div>';
  inner.appendChild(vOld);
  inner.appendChild(h('div','','<div style="text-align:center;font-size:18px;color:rgba(72,202,193,0.5);margin:6px 0">\u2193</div>'));
  var vNew=h('div','new-b');vNew.style.marginBottom='20px';
  vNew.innerHTML='<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#48CAC1;margin-bottom:8px;font-weight:600">Novo uverenje</div><div style="font-family:Instrument Serif,Georgia,serif;font-size:15px;color:#1a1a2e;line-height:1.6;font-style:italic">„'+esc(S.e_gen)+'“</div>';
  inner.appendChild(vNew);
  if(S.reflections&&S.reflections.filter(Boolean).length>0){
    var rCard=h('div','insight');rCard.style.marginBottom='16px';
    var rHtml='<div class="il">Tvoji uvidi iz sesije</div>';
    S.reflections.filter(Boolean).forEach(function(r){
      rHtml+='<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(26,26,46,0.07)">'+
        '<div style="font-size:11px;color:rgba(26,26,46,0.4);margin-bottom:4px;font-style:italic">'+esc(r.q)+'</div>'+
        '<div style="font-size:14px;color:#1a1a2e;line-height:1.5">"'+esc(r.a)+'"</div></div>';
    });
    rCard.innerHTML=rHtml;inner.appendChild(rCard);
  }
  var nb=h('button','bp','Početni ekran');nb.onclick=renderHome;inner.appendChild(nb);
  s.appendChild(inner);root.appendChild(s);
}

function renderReview(idx,sess){
  root.innerHTML='';var s=h('div','sf');var inner=h('div','sfi fi');inner.style.justifyContent='flex-start';inner.style.paddingTop='0';
  makeTopbar(inner);
  inner.appendChild(h('div','label','Shame Attack \u2014 Rezultat'));
  var q='Hajde da uporedimo očekivanje i realnost.';
  showNessaMsg(inner, q, {delay:400});
  var task=h('div','insight');task.innerHTML='<div class="il">Eksperiment</div><div class="it">'+esc(sess.shame)+'</div>';inner.appendChild(task);
  var exp=h('div','old-b');
  exp.innerHTML='<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,80,80,0.5);margin-bottom:10px;font-weight:600">Očekivanje</div><div style="font-size:14px;color:rgba(26,26,46,0.6);line-height:1.6">'+esc(sess.expect)+'</div>';
  inner.appendChild(exp);
  showNessaMsg(inner, 'Šta se ZAISTA desilo?', {delay:1600, speak:false});
  var nb=h('button','bg','Sačuvaj');nb.disabled=true;
  var t=makeTa('Šta se zaista desilo...','',function(v){nb.disabled=!v});inner.appendChild(t.wrap);
  nb.onclick=async function(){
    var actual=t.ta.value.trim();if(!actual)return;
    nb.disabled=true;nb.textContent='Analiziram...';
    completeSA(idx,actual);
    inner.innerHTML='';
    inner.appendChild(h('div','label','Jaz'));
    // show cards immediately while AI loads
    var e2=h('div','old-b');e2.innerHTML='<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,100,100,0.5);margin-bottom:8px">Očekivanje</div><div style="font-size:14px;color:rgba(180,60,60,0.4);line-height:1.6;text-decoration:line-through">'+esc(sess.expect)+'</div>';inner.appendChild(e2);
    inner.appendChild(h('div','','<div style="text-align:center;font-size:18px;color:rgba(72,202,193,0.5);margin:8px 0">\u2193</div>'));
    var a2=h('div','new-b');a2.innerHTML='<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#48CAC1;margin-bottom:8px;font-weight:600">Realnost</div><div style="font-size:14px;color:#1a1a2e;line-height:1.6">'+esc(actual)+'</div>';inner.appendChild(a2);
    // Nessa analysis bubble placeholder
    var aiName=h('div','nessa-name');aiName.textContent='Nessa';inner.appendChild(aiName);
    var aiRow=h('div','nessa-row');
    var aiAv=document.createElement('img');aiAv.className='nessa-av';aiAv.src=NESSA_AV;aiAv.alt='Nessa';
    var aiBub=h('div','nessa-bubble small');aiBub.textContent='...';aiBub.style.minHeight='50px';
    aiRow.appendChild(aiAv);aiRow.appendChild(aiBub);inner.appendChild(aiRow);
    var hb=h('button','bp','Početni ekran');hb.onclick=renderHome;inner.appendChild(hb);
    // fetch AI analysis
    try{
      var resp=await fetch('/api/gap',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({b:sess.b||S.b,expect:sess.expect,actual:actual})});
      var data=await resp.json();
      var analysis=data.analysis||'Svaki put kad vidiš ovaj jaz, tvoj mozak uči da katastrofa nije došla — i sledeći put strah je manji.';
      aiBub.textContent=analysis;
      speak(analysis);
    }catch(e){
      aiBub.textContent='Pogledaj razliku. Ovaj jaz je dokaz tvom nervnom sistemu.';
      speak('Pogledaj razliku. Ovaj jaz je dokaz tvom nervnom sistemu.');
    }
  };
  inner.appendChild(nb);var bb=h('button','bs','Nazad');bb.onclick=renderHome;inner.appendChild(bb);
  s.appendChild(inner);root.appendChild(s);
}

function renderHistory(){
  root.innerHTML='';var s=h('div','sf');var inner=h('div','sfi fi');inner.style.justifyContent='flex-start';inner.style.paddingTop='0';
  makeTopbar(inner);var histLabel=h('div','label','Istorija');histLabel.style.color='rgba(255,255,255,0.9)';inner.appendChild(histLabel);
  var hi=loadHist();
  if(!hi.length){inner.appendChild(h('p','hint','Nema sesija.'));s.appendChild(inner);root.appendChild(s);return}
  renderDashboard(inner,hi);
  hi.forEach(function(ses,idx){var item=h('div','hist-item');item.style.cursor='pointer';
    var d=new Date(ses.ts);var ds=d.getDate()+'.'+(d.getMonth()+1)+'. '+d.getHours()+':'+('0'+d.getMinutes()).slice(-2);
    var rateColor=ses.r2<ses.r1?'#48CAC1':'rgba(26,26,46,0.4)';
    var badges='<span class="badge" style="background:rgba(72,202,193,0.12);color:#48CAC1">'+ses.r1+' → '+ses.r2+'</span>';
    if(ses.shame&&!ses.done)badges+='<span class="badge badge-warn">SA čeka</span>';
    if(ses.done)badges+='<span class="badge" style="background:rgba(72,202,193,0.12);color:#48CAC1">SA završen</span>';
    var ePreview=ses.e?'<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(26,26,46,0.07)">'+
      '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#48CAC1;margin-bottom:4px;font-weight:600">Novo uverenje</div>'+
      '<div style="font-size:13px;color:#1a1a2e;line-height:1.5;font-style:italic">„'+esc(ses.e)+'“</div>'+
      '</div>':'';
    item.innerHTML=
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'+
        '<div style="font-size:12px;color:rgba(26,26,46,0.4)">'+ds+'</div>'+
        '<div style="font-size:11px;color:rgba(26,26,46,0.35)">detalji ›</div>'+
      '</div>'+
      '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(26,26,46,0.35);margin-bottom:4px;font-weight:600">Staro uverenje</div>'+
      '<div style="font-size:14px;color:#1a1a2e;line-height:1.5;font-style:italic">„'+esc(ses.b).substring(0,90)+(ses.b.length>90?'…':'')+'“</div>'+
      ePreview+
      '<div style="margin-top:10px">'+badges+'</div>';
    item.onclick=function(){
      if(ses.shame&&!ses.done){renderReview(idx,ses)}else{renderSessionDetail(ses,idx)}
    };
    inner.appendChild(item)});
  s.appendChild(inner);root.appendChild(s);
}

function renderSessionDetail(ses,idx){
  root.innerHTML='';var s=h('div','sf');var inner=h('div','sfi fi');inner.style.justifyContent='flex-start';inner.style.paddingTop='0';
  makeTopbar(inner);
  var d=new Date(ses.ts);var ds=d.getDate()+'.'+(d.getMonth()+1)+'. '+d.getFullYear()+' '+d.getHours()+':'+('0'+d.getMinutes()).slice(-2);
  inner.appendChild(h('div','ldim',ds));
  inner.appendChild(h('div','label','Sesija'));

  // Situacija
  if(ses.a){var ca=h('div','insight');ca.innerHTML='<div class="il">A — Situacija</div><div class="it">'+esc(ses.a)+'</div>';inner.appendChild(ca);}

  // Staro → Novo uverenje
  var bel=h('div','');bel.style.marginBottom='14px';
  bel.innerHTML=
    '<div class="old-b">'+
      '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,80,80,0.6);margin-bottom:8px;font-weight:600">B — Staro uverenje</div>'+
      '<div style="font-family:Instrument Serif,Georgia,serif;font-size:16px;color:rgba(200,80,80,0.7);line-height:1.6;font-style:italic;text-decoration:line-through">„'+esc(ses.b)+'“</div>'+
    '</div>'+
    '<div style="text-align:center;font-size:18px;color:rgba(72,202,193,0.5);margin:6px 0">↓</div>'+
    (ses.e?
      '<div class="new-b">'+
        '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#48CAC1;margin-bottom:8px;font-weight:600">E — Novo uverenje</div>'+
        '<div style="font-family:Instrument Serif,Georgia,serif;font-size:16px;color:#1a1a2e;line-height:1.6;font-style:italic">„'+esc(ses.e)+'“</div>'+
      '</div>'
    :'');
  inner.appendChild(bel);

  // Skala žudnje
  var scale=h('div','insight');
  var diff=ses.r2-ses.r1;
  var diffTxt=diff<0?'↓ '+Math.abs(diff)+' manje':diff===0?'Isto':'↑ '+diff+' vise';
  var diffCol=diff<0?'#48CAC1':diff===0?'rgba(26,26,46,0.4)':'rgba(200,80,80,0.6)';
  scale.innerHTML='<div class="il">Intenzitet žudnje</div>'+
    '<div style="display:flex;align-items:center;gap:16px;margin-top:4px">'+
      '<div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#1a1a2e">'+ses.r1+'</div><div style="font-size:11px;color:rgba(26,26,46,0.4)">Pre</div></div>'+
      '<div style="font-size:20px;color:rgba(26,26,46,0.2)">→</div>'+
      '<div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#1a1a2e">'+ses.r2+'</div><div style="font-size:11px;color:rgba(26,26,46,0.4)">Posle</div></div>'+
      '<div style="margin-left:auto;font-size:14px;font-weight:600;color:'+diffCol+'">'+diffTxt+'</div>'+
    '</div>';
  inner.appendChild(scale);

  // Shame attack
  if(ses.shame){
    var sa=h('div','insight');
    sa.innerHTML='<div class="il">Shame Attack</div>'+
      '<div class="it" style="margin-bottom:10px">'+esc(ses.shame)+'</div>'+
      (ses.expect?'<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(26,26,46,0.35);margin-bottom:4px;margin-top:10px;font-weight:600">Očekivanje</div>'+
        '<div style="font-size:13px;color:rgba(26,26,46,0.5);line-height:1.5;font-style:italic">„'+esc(ses.expect)+'“</div>':'')+
      (ses.actual?'<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#48CAC1;margin-bottom:4px;margin-top:12px;font-weight:600">Realnost</div>'+
        '<div style="font-size:13px;color:#1a1a2e;line-height:1.5;font-weight:500">„'+esc(ses.actual)+'“</div>':
        '<div style="font-size:12px;color:rgba(200,160,80,0.8);margin-top:10px;font-weight:500">Još nije urađen</div>');
    inner.appendChild(sa);
  }

  var bb=h('button','bs','Nazad');bb.onclick=renderHistory;inner.appendChild(bb);
  s.appendChild(inner);root.appendChild(s);
}

renderHome();
</script>
