<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#101014;font-family:'DM Sans',sans-serif;color:#fff;overflow-x:hidden;
padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

textarea{font-family:'DM Sans',sans-serif;outline:none;resize:none;-webkit-appearance:none}

0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(126,184,168,0.15),0 0 120px rgba(126,184,168,0.06)}

}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.ldim{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:10px}
.t1{font-family:'Instrument Serif',Georgia,serif;font-size:32px;font-weight:400;line-height:1.2}
.t2{font-family:'Instrument Serif',Georgia,serif;font-size:26px;font-weight:400;line-height:1.35;margin-bottom:8px}

.step-bar{display:flex;gap:4px;justify-content:center;margin-bottom:20px}

.panic-btn{width:170px;height:170px;border-radius:50%;border:none;
background:radial-gradient(circle,#7EB8A8 0%,#5A9A8A 100%);
box-shadow:0 0 60px rgba(126,184,168,0.15),0 0 120px rgba(126,184,168,0.06);
display:flex;align-items:center;justify-content:center;animation:breathe 3s ease-in-out infinite;
font-size:15px;font-weight:600;color:#fff;letter-spacing:1.5px;text-transform:uppercase}
.ta{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;
padding:16px 18px;color:#fff;font-size:15px;line-height:1.7;min-height:100px;margin-bottom:4px;transition:border-color 0.3s ease}
.ta:focus{border-color:rgba(126,184,168,0.4)}
.ta::placeholder{color:rgba(255,255,255,0.2)}
.dict-hint{font-size:11px;color:rgba(255,255,255,0.2);margin-bottom:14px;text-align:right}

padding:15px 28px;font-size:14px;color:#7EB8A8;font-weight:500;width:100%;margin-top:4px}

padding:13px 24px;font-size:13px;color:rgba(255,255,255,0.45);width:100%;margin-top:8px}
.bg{background:rgba(126,184,168,0.12);border:1px solid rgba(126,184,168,0.3);border-radius:12px;
padding:15px 28px;font-size:14px;color:#7EB8A8;font-weight:500;width:100%;margin-top:4px}
.insight{background:rgba(126,184,168,0.04);border:1px solid rgba(126,184,168,0.1);border-radius:16px;padding:22px 20px;margin:16px 0;text-align:left}

.dcard .dt{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#7EB8A8;margin-bottom:10px}

font-family:'Instrument Serif',Georgia,serif;font-size:15px;flex-shrink:0}
.stxt{flex:1;font-size:13px;line-height:1.65;color:rgba(255,255,255,0.55)}

.old-b{background:rgba(200,80,80,0.05);border:1px solid rgba(200,80,80,0.1);border-radius:16px;padding:22px 20px;text-align:left;margin-bottom:10px}
.new-b{background:rgba(126,184,168,0.05);border:1px solid rgba(126,184,168,0.12);border-radius:16px;padding:22px 20px;text-align:left;margin-bottom:16px}
.rg{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:320px;margin:0 auto 16px}
.rb{width:100%;aspect-ratio:1;border-radius:12px;cursor:pointer;font-size:18px;transition:all 0.2s ease;
font-family:'DM Sans',sans-serif;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-weight:400}
.rb.sel{border:2px solid #7EB8A8;color:#fff;font-weight:700;transform:scale(1.1)}
.body-opt{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;
padding:14px 16px;margin-bottom:8px;font-size:14px;color:rgba(255,255,255,0.6);text-align:left;transition:all 0.25s ease}
.body-opt.sel{background:rgba(126,184,168,0.1);border-color:rgba(126,184,168,0.25);color:#fff}
.timer-ring{position:relative;width:160px;height:160px;margin:0 auto 30px}
.timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:300;letter-spacing:2px}
.hist-item{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px 18px;margin-bottom:10px;text-align:left;cursor:pointer}
.badge{display:inline-block;background:rgba(126,184,168,0.12);color:#7EB8A8;font-size:11px;padding:4px 10px;border-radius:8px;font-weight:500;margin-right:6px}
.badge-warn{background:rgba(200,160,80,0.12);color:rgba(200,180,120,0.9)}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:24px;text-align:center}
.loading-orb{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,rgba(126,184,168,0.3),rgba(126,184,168,0.05));animation:breathe 2s ease-in-out infinite;margin-bottom:24px}
.loading-text::after{content:'';animation:dots 1.5s infinite steps(4)}

<body>
<div class="app"><div class="amb"></div><div id="root"></div></div>

<script>
var S={a:'',b:'',c_feel:'',c_do:'',d:[0,0,0],e_gen:'',rate1:0,bodyWhere:'',rate2:0,shame_task:'',shame_expect:''};
var AI={};
var root=document.getElementById('root');
var AUDIO=false;
var audioQueue=[];var audioPlaying=false;

function h(t,c,html){var e=document.createElement(t);if(c)e.className=c;if(html!==undefined)e.innerHTML=html;return e}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* --- TTS --- */
function splitText(text,maxLen){
  var clean=text.replace(/<[^>]*>/g,'').replace(/\u2014/g,', ').replace(/\u2192/g,' u ');
  var sentences=clean.split(/(?<=[.!?])\s+/);var chunks=[];var cur='';
  for(var i=0;i<sentences.length;i++){if((cur+' '+sentences[i]).length>maxLen&&cur){chunks.push(cur.trim());cur=sentences[i]}else{cur+=(cur?' ':'')+sentences[i]}}
  if(cur)chunks.push(cur.trim());return chunks;
}
function speak(text){if(!AUDIO)return;stopAudio();audioQueue=splitText(text,180);playNext()}
function playNext(){
  if(!audioQueue.length){audioPlaying=false;updateSI(false);return}
  audioPlaying=true;updateSI(true);var chunk=audioQueue.shift();
  var url='https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(chunk)+'&tl=sr&client=tw-ob&ttsspeed=0.9';
  var a=new Audio(url);
  a.onended=function(){playNext()};
  a.onerror=function(){fallbackSpeak(chunk)};
  a.play().catch(function(){fallbackSpeak(chunk)});
}
function fallbackSpeak(chunk){var s=window.speechSynthesis;if(s){var u=new SpeechSynthesisUtterance(chunk);u.lang='sr-RS';u.rate=0.85;u.onend=function(){playNext()};s.speak(u)}else{playNext()}}
function stopAudio(){audioQueue=[];audioPlaying=false;if(window.speechSynthesis)window.speechSynthesis.cancel();updateSI(false)}
function updateSI(on){var el=document.getElementById('speak-ind');if(el)el.style.display=on?'inline-block':'none'}

/* --- AI API via Netlify Function proxy --- */
async function callAI(prompt) {
  try {
    console.log('[AI] Saljem zahtev na novi Gemini backend...');

    const response = await fetch('/api/rebt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const errorBody = await response.text();
      throw new Error('HTTP ' + response.status + ' - ' + errorBody);
    }

    const data = await response.json();
    let text = data.content.map(c => c.text || '').join('');
    text = text.replace(/```json\s*|\s*```/g, '').trim();

    let parsed;
    try {
      parsed = JSON.parse(text);
    } catch(parseErr) {
      // Pokusaj da popravimo odseceni JSON dodavanjem zatvarajucih znakova
      let fixed = text;
      // Zatvori otvorene stringove i objekte
      const openBraces = (fixed.match(/{/g)||[]).length - (fixed.match(/}/g)||[]).length;
      if(fixed.match(/"[^"]*$/)){ fixed += '"'; } // zatvori otvoreni string
      for(let i=0;i<openBraces;i++){ fixed += '}'; }
      try {
        parsed = JSON.parse(fixed);
        console.warn('[AI] JSON bio odsecen, popravljen.');
      } catch(e2) {
        throw new Error('Unterminated string in JSON at position ' + parseErr.message);
      }
    }
    console.log('[AI] USPESNO! Odgovorio model:', data.source, parsed);
    return parsed;

  } catch (err) {
    console.error('[AI] GRESKA:', err.message || err);
    return null;
  }
}

async function generatePersonalized(){
  var prompt='Klijent prolazi kroz REBT ABCDE proces za food craving.\n\n'+
    'A (Situacija): "'+S.a+'"\n'+
    'B (Iracionalno uverenje): "'+S.b+'"\n'+
    'C (Emocije): "'+S.c_feel+'"\n'+
    'C (Ponasanje ako popusti): "'+S.c_do+'"\n\n'+
    'Generisi personalizovane terapeutske odgovore u JSON formatu:\n'+
    '{\n'+
    '  "d_logic_q": "Personalizovano logicko pitanje za OVO KONKRETNO uverenje (1-2 recenice, obraca se klijentu direktno)",\n'+
    '  "d_logic_yes": "Odgovor ako klijent kaze DA na logicko pitanje (2-3 recenice, koristi klijentove reci iz B)",\n'+
    '  "d_logic_no": "Odgovor ako kaze NE (1-2 recenice, potvrdi i produbi uvid)",\n'+
    '  "d_empir_q": "Personalizovano empirijsko pitanje — trazi KONKRETNE dokaze za OVO uverenje",\n'+
    '  "d_empir_yes": "Odgovor ako DA (2-3 recenice)",\n'+
    '  "d_empir_no": "Odgovor ako NE (1-2 recenice)",\n'+
    '  "d_func_q": "Funkcionalno pitanje — referisi se na klijentove KONKRETNE emocije i ponasanja iz C",\n'+
    '  "d_func_yes": "Odgovor ako DA — citiraj klijentove reci iz C da pokaze kontradikciju (2-3 recenice)",\n'+
    '  "d_func_no": "Odgovor ako NE (1-2 recenice)",\n'+
    '  "e_new_belief": "Novo racionalno uverenje — DIREKTNO preformulisi klijentovo uverenje iz B. Ne budi generican. Koristi klijentove reci i situaciju. Fleksibilna preferencija umesto zahteva. Max 3 recenice.",\n'+
    '  "shame_task": "VAZNO — analiziraj klijentovo uverenje iz B i emocije/ponasanje iz C pre nego sto predlozis eksperiment. Postoje DVA tipa: (1) Ako je motivacija ZABAVA, UZIVANJE, OLAKSANJE ili DOSADA (niska tolerancija na frustraciju, Ellis-ov treci mus), predlozi EKSPERIMENT TOLERANCIJE: klijent svesno bira alternativni izvor zadovoljstva iste veceri i bezi da li mu je OK i bez hrane. (2) Ako je motivacija STRAH OD NEUSPEHA, STID ili SRAMOTA, predlozi pravi SHAME ATTACK koji napada taj strah direktno. Budi konkretan, izvodljiv danas ili sutra. 2-3 recenice.",\n'+
    '  "rei_scene": "REI scena — NEGATIVNI scenario. Klijent zamišlja kako POPUŠTA uverenju i kako se oseća POSLE: krivica, stid, osecaj poraza, tegoba u telu. Koristi klijentovu situaciju iz A i ponasanje iz C_do. NE opisuj pozitivnu alternativu — opisuj negativnu posledicu koju klijent treba emotivno da dozivi pre nego sto je promeni. 1-2 recenice."\n'+
    '}\n\nVAZNO: Odgovori SAMO JSON. Bez teksta pre ili posle. Bez backtick-a. Koristi klijentove tacne reci gde god mozes.';
  return await callAI(prompt);
}

/* --- UI helpers --- */
function makeTopbar(container){
  var tb=h('div','topbar');
  var hb=h('button','home-btn','×');hb.onclick=function(){stopAudio();renderHome()};
  var right=h('div','');right.style.cssText='display:flex;align-items:center;gap:8px';
  var ab=h('button','audio-tog'+(AUDIO?' on':''),'♪ GLAS');
  ab.onclick=function(){AUDIO=!AUDIO;ab.className='audio-tog'+(AUDIO?' on':'');if(!AUDIO)stopAudio()};
  var si=h('span','speaking-indicator','●');si.id='speak-ind';si.style.display='none';
  right.appendChild(si);right.appendChild(ab);tb.appendChild(hb);tb.appendChild(right);
  container.insertBefore(tb,container.firstChild);
}
function makeTa(placeholder,value,onInput){
  var ta=h('textarea','ta');ta.placeholder=placeholder;ta.value=value||'';
  ta.oninput=function(){onInput(ta.value.trim())};
  var hint=h('div','dict-hint','🎤 Mikrofon na tastaturi za diktaciju');
  var wrap=h('div','');wrap.appendChild(ta);wrap.appendChild(hint);return{wrap:wrap,ta:ta};
}
function bar(cur,total){total=total||8;var d=h('div','step-bar');
  for(var i=0;i<total;i++){var s=h('div','step-seg');s.style.width=i===cur?'28px':i<cur?'16px':'10px';
  s.style.background=i===cur?'#7EB8A8':i<cur?'rgba(126,184,168,0.35)':'rgba(255,255,255,0.07)';d.appendChild(s)}return d}

function loadHist(){try{return JSON.parse(localStorage.getItem('rebt_hist')||'[]')}catch(e){return[]}}
function saveSession(){var hi=loadHist();
  hi.unshift({ts:Date.now(),a:S.a,b:S.b,c_feel:S.c_feel,c_do:S.c_do,e:S.e_gen,r1:S.rate1,r2:S.rate2,shame:S.shame_task,expect:S.shame_expect,actual:'',done:false});
  localStorage.setItem('rebt_hist',JSON.stringify(hi.slice(0,50)))}
function getPending(){var hi=loadHist();for(var i=0;i<hi.length;i++){if(!hi[i].done&&hi[i].shame)return{idx:i,s:hi[i]}}return null}
function completeSA(idx,actual){var hi=loadHist();if(hi[idx]){hi[idx].actual=actual;hi[idx].done=true;localStorage.setItem('rebt_hist',JSON.stringify(hi))}}

function renderHome(){
  stopAudio();root.innerHTML='';var s=h('div','sc fi');
  var hi=loadHist(),pending=getPending(),count=hi.length;
  s.innerHTML='<div style="margin-bottom:44px"><div class="ldim">REBT Protocol</div>'+
    '<h1 class="t1">Preispitaj uverenje.</h1>'+
    '<p class="hint" style="margin-top:14px;max-width:270px">AI terapeut koji te vodi kroz ABCDE proces. Personalizovano, ne genericno.</p>'+
    (count?'<p style="margin-top:12px"><span class="badge">'+count+' sesija</span></p>':'')+
    '</div>';
  if(pending){var pb=h('button','');
    pb.style.cssText='background:rgba(200,180,120,0.06);border:1px solid rgba(200,180,120,0.15);border-radius:14px;padding:18px 20px;width:100%;text-align:left;margin-bottom:20px;color:#fff';
    pb.innerHTML='<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,180,120,0.7);margin-bottom:8px">Shame attack ceka</div><div style="font-size:14px;color:rgba(255,255,255,0.6);line-height:1.5">Jesi li uradio eksperiment?</div>';
    pb.onclick=function(){renderReview(pending.idx,pending.s)};s.appendChild(pb)}
  var btn=h('button','panic-btn','Pokreni');
  btn.onclick=function(){S={a:'',b:'',c_feel:'',c_do:'',d:[0,0,0],e_gen:'',rate1:0,bodyWhere:'',rate2:0,shame_task:'',shame_expect:''};AI={};renderA()};
  s.appendChild(btn);
  if(count>0){var hb=h('button','bs','Istorija');hb.style.marginTop='20px';hb.onclick=renderHistory;s.appendChild(hb)}
  root.appendChild(s);
}

function renderA(){
  root.innerHTML='';var s=h('div','sf');var inner=h('div','sfi fi');
  makeTopbar(inner);inner.appendChild(bar(0));
  inner.appendChild(h('div','label','A \u2014 Aktivirajuci dogadjaj'));
  var q='Sta se upravo desilo ili desava? Opisi situaciju samo cinjenicama.';
  inner.appendChild(h('p','therapist',q));speak(q);
  inner.appendChild(h('p','hint','Npr: "Kasno je, sedim sam, vidim cokoladu u frizideru."<br><br>'));
  var nb=h('button','bp','Dalje');nb.disabled=!S.a;
  var t=makeTa('Sta se desilo...',S.a,function(v){S.a=v;nb.disabled=!v});
  inner.appendChild(t.wrap);nb.onclick=function(){renderB()};inner.appendChild(nb);
  s.appendChild(inner);root.appendChild(s);t.ta.focus();
}

function renderB(){
  root.innerHTML='';var s=h('div','sf');var inner=h('div','sfi fi');
  makeTopbar(inner);inner.appendChild(bar(1));
  inner.appendChild(h('div','label','B \u2014 Uverenje'));
  var ib=h('div','insight');ib.innerHTML='<div class="il">Situacija</div><div class="it">"'+esc(S.a)+'"</div>';inner.appendChild(ib);
  var q='Kad se to desilo, sta si rekao sebi? Koji glas se javio?';
  inner.appendChild(h('p','therapist',q));speak(q);

function renderREI(){
  root.innerHTML='';var s=h('div','sf');var inner=h('div','sfi fi');inner.style.alignItems='center';
  makeTopbar(inner);inner.appendChild(bar(6));
  inner.appendChild(h('div','label','REI \u2014 Zamisljanje'));
  var bp=S.bodyWhere.split(' \u2014')[0].toLowerCase();
  var scene=AI.rei_scene||'Zamisli svoju situaciju.';
  var feelShort=S.c_feel.length>60?S.c_feel.substring(0,60)+'...':S.c_feel;
  var steps=[
    {text:esc(scene)+' Pusti najgore osecanje. Oseti ga u '+bp+'u. <strong>Ostani tu.</strong>',
     speak:scene+' Pusti najgore osecanje. Oseti ga u '+bp+'u. Ostani tu.',dur:25},
    {text:'Sad pomeri to osecanje za jedan stepen. Znas taj osecaj — <em>"'+esc(feelShort)+'"</em>. Pusti ga da se spusti za jedan nivo. Ne uklanjaj, samo smanji intenzitet.',
     speak:'Sad pomeri to osecanje za jedan stepen. Znas taj osecaj — '+feelShort+'. Pusti ga da se spusti za jedan nivo. Ne uklanjaj, samo smanji.',dur:20},
    {text:'Izgovori naglas:<br><br><em>"'+esc(S.e_gen)+'"</em>',
     speak:'Izgovori naglas. '+S.e_gen,dur:15}
  ];
  var step=0;
  var instrBox=h('div','');instrBox.style.cssText='background:rgba(126,184,168,0.04);border:1px solid rgba(126,184,168,0.1);border-radius:16px;padding:24px 20px;margin:16px 0;text-align:center;min-height:130px;display:flex;align-items:center;justify-content:center';
  var instrText=h('p','');instrText.style.cssText='font-family:Instrument Serif,Georgia,serif;font-size:17px;color:rgba(255,255,255,0.85);line-height:1.6';
  instrText.innerHTML=steps[0].text;instrBox.appendChild(instrText);inner.appendChild(instrBox);speak(steps[0].speak);
  var tl=steps[0].dur,tr=true,ti;var circ=2*Math.PI*70;
  var ring=h('div','timer-ring');
  ring.innerHTML='<svg width="160" height="160" style="transform:rotate(-90deg)"><circle cx="80" cy="80" r="70" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="3"/><circle id="rei-c" cx="80" cy="80" r="70" fill="none" stroke="#7EB8A8" stroke-width="3" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="0" style="transition:stroke-dashoffset 1s linear"/></svg><div class="timer-num" id="rei-t">'+tl+'</div>';
  inner.appendChild(ring);
  var nb=h('button','bp','');nb.style.display='none';
  function tick(){if(!tr)return;tl--;document.getElementById('rei-t').textContent=tl;
    var p=1-tl/steps[step].dur;document.getElementById('rei-c').setAttribute('stroke-dashoffset',circ*(1-p));
    if(tl<=0){clearInterval(ti);tr=false;
      if(step<steps.length-1){nb.textContent='Sledeci korak';nb.style.display='block';
        nb.onclick=function(){step++;tl=steps[step].dur;instrText.innerHTML=steps[step].text;speak(steps[step].speak);
        document.getElementById('rei-t').textContent=tl;document.getElementById('rei-c').setAttribute('stroke-dashoffset','0');
        nb.style.display='none';tr=true;ti=setInterval(tick,1000)}}
      else{nb.textContent='Proveri zudnju';nb.style.display='block';nb.onclick=function(){renderBody3()}}}}
  ti=setInterval(tick,1000);inner.appendChild(nb);s.appendChild(inner);root.appendChild(s);
}

function renderHistory(){
  root.innerHTML='';var s=h('div','sf');var inner=h('div','sfi fi');inner.style.justifyContent='flex-start';inner.style.paddingTop='0';
  makeTopbar(inner);inner.appendChild(h('div','label','Istorija'));
  var hi=loadHist();
  if(!hi.length){inner.appendChild(h('p','hint','Nema sesija.'));s.appendChild(inner);root.appendChild(s);return}
  hi.forEach(function(ses,idx){var item=h('div','hist-item');
    var d=new Date(ses.ts);var ds=d.getDate()+'.'+(d.getMonth()+1)+'. '+d.getHours()+':'+('0'+d.getMinutes()).slice(-2);
    var badges='<span class="badge">'+ses.r1+'\u2192'+ses.r2+'</span>';
    if(ses.shame&&!ses.done)badges+='<span class="badge badge-warn">SA ceka</span>';
    if(ses.done)badges+='<span class="badge">SA zavrsen</span>';
    item.innerHTML='<div style="font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:6px">'+ds+'</div>'+
      '<div style="font-size:14px;color:rgba(255,255,255,0.65);line-height:1.5;margin-bottom:8px">"'+esc(ses.b).substring(0,80)+'"</div><div>'+badges+'</div>';
    if(ses.shame&&!ses.done){item.onclick=function(){renderReview(idx,ses)}}
    inner.appendChild(item)});
  s.appendChild(inner);root.appendChild(s);
}
